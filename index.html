<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⏰ Timer Kembali ke Pesantren - Jam 17:00</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            position: relative;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            margin-bottom: 30px;
        }

        .pesantren-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .deadline {
            color: #e74c3c;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .timer-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .time-unit {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px 15px;
            border-radius: 15px;
            min-width: 80px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }

        .time-unit:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .time-number {
            font-size: 2.5rem;
            font-weight: bold;
            line-height: 1;
            display: block;
        }

        .time-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status {
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            margin: 20px 0;
            transition: all 0.3s ease;
        }

        .status.warning {
            background: linear-gradient(45deg, #f39c12, #e67e22);
            color: white;
        }

        .status.expired {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
            color: white;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .status.ontime {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            color: white;
        }

        .refresh-btn {
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(52, 152, 219, 0.4);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ecf0f1;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #27ae60, #2ecc71);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        @media (max-width: 480px) {
            .timer-display {
                gap: 10px;
            }
            
            .time-unit {
                min-width: 70px;
                padding: 15px 10px;
            }
            
            .time-number {
                font-size: 2rem;
            }
            
            .container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="pesantren-icon">🕌</div>
            <h1>Timer Kembali ke Pesantren</h1>
            <div class="deadline">⏰ Batas Akhir: <strong>Hari Ini Jam 17:00</strong></div>
        </div>

        <div class="timer-display">
            <div class="time-unit">
                <span class="time-number" id="hours">00</span>
                <span class="time-label">Jam</span>
            </div>
            <div class="time-unit">
                <span class="time-number" id="minutes">00</span>
                <span class="time-label">Menit</span>
            </div>
            <div class="time-unit">
                <span class="time-number" id="seconds">00</span>
                <span class="time-label">Detik</span>
            </div>
        </div>

        <div id="status" class="status ontime">🚀 Masih Ada Waktu! Cepat Kembali!</div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <button class="refresh-btn" onclick="location.reload()">
            🔄 Refresh Timer
        </button>
    </div>

    <script>
        function updateTimer() {
            // Target waktu: hari ini jam 17:00 (5:00 PM)
            const now = new Date();
            const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 17, 0, 0, 0);
            
            // Jika sudah lewat jam 17:00 hari ini, target besok jam 17:00
            if (now >= target) {
                target.setDate(target.getDate() + 1);
            }

            const timeLeft = target - now;

            if (timeLeft <= 0) {
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                document.getElementById('status').textContent = '⏰ Waktu Kembali Telah Habis!';
                document.getElementById('status').className = 'status expired';
                document.getElementById('progressFill').style.width = '100%';
                return;
            }

            const hours = Math.floor(timeLeft / (1000 * 60 * 60));
            const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

            document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');

            // Update status dan progress
            const totalSeconds = timeLeft / 1000;
            const progress = Math.min(100, ((60 * 60 * 17 - totalSeconds) / (60 * 60 * 17)) * 100);
            
            document.getElementById('progressFill').style.width = progress + '%';

            if (hours <= 1) {
                document.getElementById('status').className = 'status warning';
                document.getElementById('status').textContent = '⚠️ Segera Kembali! Waktu Mepet!';
            } else if (hours <= 3) {
                document.getElementById('status').className = 'status warning';
                document.getElementById('status').textContent = '🚨 Buruan Kembali ke Pesantren!';
            } else {
                document.getElementById('status').className = 'status ontime';
                document.getElementById('status').textContent = '🚀 Masih Ada Waktu! Siapkan Diri!';
            }
        }

        // Update timer setiap detik
        setInterval(updateTimer, 1000);
        // Jalankan sekali saat load
        updateTimer();

        // Tambahkan efek suara/warning saat tersisa 5 menit (opsional)
        setInterval(() => {
            const now = new Date();
            const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 17, 0, 0, 0);
            if (now >= target) target.setDate(target.getDate() + 1);
            
            const timeLeft = target - now;
            if (timeLeft <= 5 * 60 * 1000 && timeLeft > 0) { // 5 menit
                if (!document.hasFocus()) {
                    // Bisa tambahkan notifikasi browser
                    if (Notification.permission === 'granted') {
                        new Notification('Pesantren Timer', {
                            body: 'Waktu kembali tinggal 5 menit lagi!',
                            icon: '🕌'
                        });
                    }
                }
            }
        }, 30000); // Check setiap 30 detik
    </script>
</body>
</html>
